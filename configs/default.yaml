# ============================================
# Image Captioning - Default Configuration
# ============================================

# --- Data ---
data:
  dataset_name: "flickr8k"                  # flickr8k or flickr30k
  images_dir: "F:/Data/Flick8k/Images"
  captions_file: "F:/Data/Flick8k/captions.txt"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# --- Vocabulary ---
vocabulary:
  freq_threshold: 5         # Min word frequency to include in vocab
  max_vocab_size: null       # null = no limit

# --- Image Preprocessing ---
image:
  size: 224                  # Resize to size x size
  # ImageNet normalization stats
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# --- Model ---
model:
  encoder:
    model_name: "resnet50"   # resnet50, resnet101, efficientnet_b0
    pretrained: true
    fine_tune: false          # Whether to fine-tune CNN layers
  decoder:
    d_model: 512              # Transformer model dimension
    nhead: 8                  # Number of attention heads
    num_layers: 6             # Number of Transformer decoder layers
    dim_feedforward: 2048     # Feed-forward network dimension
    dropout: 0.1
    max_seq_len: 128          # Max sequence length for positional encoding

# --- Training ---
training:
  batch_size: 32
  num_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: "adamw"           # adam, adamw, sgd
  scheduler:
    enabled: true
    type: "cosine"             # step, cosine, reduce_on_plateau
    warmup_steps: 1000         # Linear warmup steps (important for Transformers)
    step_size: 5
    gamma: 0.5
  grad_clip: 1.0               # Gradient clipping max norm
  label_smoothing: 0.1         # Label smoothing factor (common for Transformers)

# --- Checkpoint ---
checkpoint:
  save_dir: "checkpoints"
  save_every: 5               # Save every N epochs
  save_best: true             # Save best model based on val loss

# --- Logging ---
logging:
  log_dir: "logs"
  log_every: 100              # Log every N steps
  use_tensorboard: true
  use_wandb: false
  wandb_project: "image-captioning"

# --- Inference ---
inference:
  beam_size: 5
  max_caption_length: 50
  temperature: 1.0

# --- Device ---
device: "auto"                # auto, cuda, cpu
seed: 42
num_workers: 4
