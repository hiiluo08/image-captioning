# ============================================
# Image Captioning - Default Configuration
# ============================================

# --- Data ---
data:
  dataset_name: "flickr8k"                  # flickr8k or flickr30k
  images_dir: "data/Images"
  captions_file: "data/captions.txt"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# --- Vocabulary ---
vocabulary:
  freq_threshold: 5         # Min word frequency to include in vocab
  max_vocab_size: null       # null = no limit

# --- Image Preprocessing ---
image:
  size: 224                  # Resize to size x size
  # ImageNet normalization stats
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# --- Model ---
model:
  encoder:
    model_name: "resnet50"   # resnet50, resnet101, efficientnet_b0
    pretrained: true
    fine_tune: false          # Whether to fine-tune CNN layers
  decoder:
    embed_size: 256
    hidden_size: 512
    num_layers: 1
    dropout: 0.5
  attention:
    enabled: false            # Set to true to use attention mechanism
    attention_dim: 256

# --- Training ---
training:
  batch_size: 32
  num_epochs: 20
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  optimizer: "adam"           # adam, adamw, sgd
  scheduler:
    enabled: true
    type: "step"              # step, cosine, reduce_on_plateau
    step_size: 5
    gamma: 0.5
  grad_clip: 5.0              # Gradient clipping max norm
  teacher_forcing_ratio: 1.0  # 1.0 = always use teacher forcing

# --- Checkpoint ---
checkpoint:
  save_dir: "checkpoints"
  save_every: 5               # Save every N epochs
  save_best: true             # Save best model based on val loss

# --- Logging ---
logging:
  log_dir: "logs"
  log_every: 100              # Log every N steps
  use_tensorboard: true
  use_wandb: false
  wandb_project: "image-captioning"

# --- Inference ---
inference:
  beam_size: 5
  max_caption_length: 50
  temperature: 1.0

# --- Device ---
device: "auto"                # auto, cuda, cpu
seed: 42
num_workers: 4
